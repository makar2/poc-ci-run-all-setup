name: 1 Success
on: workflow_dispatch

jobs:
  prep:
    runs-on: ubuntu-latest
    steps:
      - run: echo ">>> prep"

  test-1:
    needs: [prep]
    runs-on: ubuntu-latest
    steps:
      - run: echo ">>> test-1"
      - run: echo "${{ needs.prep.outputs.success }}"
      - run: echo "${{ needs.prep.outputs.pass }}"
      - run: echo "${{ needs.prep.outputs.status }}"
      - run: echo "${{ needs.prep.outputs.code }}"
      - run: echo "${{ needs.prep.outputs.exit }}"

